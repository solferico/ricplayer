<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;background:#0a8a30;color:#fff;font-family:Arial;overflow:hidden">
  <div id="d" style="position:absolute;top:20px;left:20px;font-size:160px;font-weight:bold;line-height:1.1">?</div>
  <div id="d2" style="position:absolute;bottom:20px;left:20px;font-size:70px">origen: ...</div>
  <div style="position:absolute;top:50%;right:30px;width:300px;height:300px;background:red;border:20px solid yellow"></div>
  <script>
    document.getElementById('d').textContent =
      'inner ' + window.innerWidth + 'x' + window.innerHeight +
      '  |  screen ' + screen.width + 'x' + screen.height +
      '  |  dpr ' + window.devicePixelRatio;
    document.getElementById('d2').textContent = 'origen: ' + location.origin + location.pathname + location.search;
  </script>
</body>
</html>
